<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Запис на манікюр TMA</title>
    <!-- Підключення Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS через CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Скляний морфізм */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* Анімація появи */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Приховування елементів */
        .hidden-step { display: none; }
        
        /* Приховування скролбару для iOS стилю */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Стилі для обраних елементів */
        .selected-item {
            background: #f43f5e !important; /* колір rose-500 */
            color: white !important;
            border-color: #f43f5e !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-rose-100 to-teal-50 min-h-screen font-sans antialiased text-slate-800">

    <!-- Контейнер додатку -->
    <div id="app" class="max-w-md mx-auto p-4 pb-24">
        
        <!-- Завантажувач (Лоадер) -->
        <div id="loader" class="flex flex-col items-center justify-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-rose-500"></div>
            <p class="mt-4 text-slate-500">Завантаження магії...</p>
        </div>

        <!-- ГОЛОВНИЙ ЕКРАН (КЛІЄНТ) -->
        <div id="client-screen" class="hidden-step fade-in">
            <header class="mb-6">
                <h1 class="text-2xl font-bold text-slate-900">Привіт, <span id="user-name">Гостю</span>!</h1>
                <p class="text-slate-500 text-sm">Запишись на ідеальний манікюр</p>
            </header>

            <!-- Кнопки перемикання -->
            <div class="flex gap-2 mb-6">
                <button onclick="showStep('step-booking')" class="flex-1 py-3 px-4 glass rounded-2xl text-sm font-semibold active:scale-95 transition-all">Новий запис</button>
                <button onclick="showStep('step-my-bookings')" class="flex-1 py-3 px-4 glass rounded-2xl text-sm font-semibold active:scale-95 transition-all">Мої візити</button>
            </div>

            <!-- КРОК 1: ВИБІР ПОСЛУГИ -->
            <div id="step-booking" class="step-content space-y-4">
                <h3 class="font-bold text-lg px-1">Оберіть послугу</h3>
                <div id="services-list" class="space-y-3">
                    <!-- Сюди JS вставить послуги -->
                </div>
            </div>

            <!-- КРОК 2: ВИБІР МАЙСТРА -->
            <div id="step-master" class="step-content hidden-step space-y-4">
                <h3 class="font-bold text-lg px-1">Оберіть майстра</h3>
                <div id="masters-list" class="space-y-3">
                    <!-- Сюди JS вставить майстрів -->
                </div>
            </div>

            <!-- КРОК 3: РОЗУМНИЙ ВИБІР ДАТИ ТА ЧАСУ -->
            <div id="step-datetime" class="step-content hidden-step space-y-4">
                <h3 class="font-bold text-lg px-1">Дата</h3>
                <!-- Горизонтальний скрол дат -->
                <div id="date-scroll" class="flex overflow-x-auto gap-2 pb-2 hide-scrollbar">
                    <!-- Сюди JS вставить дати -->
                </div>
                
                <h3 class="font-bold text-lg px-1 mt-4">Вільний час</h3>
                <div id="time-loader" class="hidden text-center text-sm text-slate-500">Перевірка графіку...</div>
                <div id="time-slots" class="grid grid-cols-3 gap-2">
                    <!-- Сюди JS вставить слоти часу -->
                </div>
            </div>

            <!-- МОЇ ЗАПИСИ -->
            <div id="step-my-bookings" class="step-content hidden-step space-y-4">
                <h3 class="font-bold text-lg px-1">Ваші записи</h3>
                <div id="my-bookings-list" class="space-y-3 text-sm">
                    <!-- Список записів клієнта -->
                </div>
            </div>
        </div>

        <!-- ЕКРАН АДМІНІСТРАТОРА -->
        <div id="admin-screen" class="hidden-step fade-in">
            <header class="mb-6">
                <h1 class="text-2xl font-bold text-slate-900">Панель майстра</h1>
                <p class="text-slate-500 text-sm">Керування записами</p>
            </header>
            <div id="admin-bookings-list" class="space-y-4">
                <!-- Список всіх записів для майстра -->
            </div>
        </div>

    </div>

    <!-- Модальне вікно для скасування (Адмін) -->
    <div id="cancel-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center p-6 z-50">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm space-y-4">
            <h3 class="font-bold text-lg">Причина скасування</h3>
            <textarea id="cancel-reason" class="w-full p-4 bg-slate-100 rounded-2xl outline-none h-32" placeholder="Напишіть клієнту, чому не виходить прийняти..."></textarea>
            <div class="flex gap-2">
                <button onclick="closeCancelModal()" class="flex-1 py-3 rounded-xl bg-slate-200 font-semibold">Назад</button>
                <button id="confirm-cancel-btn" class="flex-1 py-3 rounded-xl bg-red-500 text-white font-semibold">Скасувати</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Запис на манікюр TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .glass { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.5); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-step { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .selected-item { background: #f43f5e !important; color: white !important; border-color: #f43f5e !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-rose-100 to-teal-50 min-h-screen font-sans antialiased text-slate-800 pb-28">

    <div id="app" class="max-w-md mx-auto p-4">
        
        <div id="loader" class="flex flex-col items-center justify-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-rose-500"></div>
            <p class="mt-4 text-slate-500">Завантаження магії...</p>
        </div>

        <div id="client-screen" class="hidden-step fade-in">
            <div id="tab-home" class="tab-content pt-24">
                <header class="fixed top-0 left-0 right-0 z-40 max-w-md mx-auto bg-white border-b border-slate-200 px-4 py-4 shadow-sm">
                    <h1 class="text-2xl font-bold text-slate-900">Привіт, <span id="user-name">Гостю</span>! 👋</h1>
                    <p class="text-slate-500 text-sm">Твій ідеальний манікюр чекає</p>
                </header>
                <div id="step-booking" class="step-content space-y-4 fade-in">
                    <h3 class="font-bold text-lg px-1">Оберіть послугу</h3>
                    <div id="services-list" class="space-y-3"></div>
                </div>
                <div id="step-master" class="step-content hidden-step space-y-4 fade-in">
                    <h3 class="font-bold text-lg px-1">Оберіть майстра</h3>
                    <div id="masters-list" class="space-y-3"></div>
                </div>
                <div id="step-datetime" class="step-content hidden-step space-y-4 fade-in">
                    <h3 class="font-bold text-lg px-1">Дата</h3>
                    <div id="date-scroll" class="flex overflow-x-auto gap-2 pb-2 hide-scrollbar"></div>
                    <h3 class="font-bold text-lg px-1 mt-4">Вільний час</h3>
                    <div id="time-loader" class="hidden text-center text-sm text-slate-500">Перевірка графіку...</div>
                    <div id="time-slots" class="grid grid-cols-3 gap-2"></div>
                </div>
            </div>

            <div id="tab-bookings" class="tab-content hidden-step pt-36">
                <header class="fixed top-0 left-0 right-0 z-40 max-w-md mx-auto bg-white shadow-sm">
                    <div class="px-4 py-4 border-b border-slate-200">
                        <h1 class="text-2xl font-bold text-slate-900">Ваші візити 💅</h1>
                    </div>
                    <div class="flex">
                        <button onclick="switchBookingTab('active', 'client')" id="client-subtab-active" class="flex-1 py-3 text-sm font-bold border-b-2 border-rose-500 text-rose-600">Підтверджені</button>
                        <button onclick="switchBookingTab('cancelled', 'client')" id="client-subtab-cancelled" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400">Скасовані</button>
                    </div>
                </header>
                <div id="my-bookings-list" class="space-y-3 text-sm"></div>
            </div>

            <div id="tab-profile" class="tab-content hidden-step pt-24">
                <header class="fixed top-0 left-0 right-0 z-40 max-w-md mx-auto bg-white border-b border-slate-200 px-4 py-4 shadow-sm">
                    <h1 class="text-2xl font-bold text-slate-900">Особистий кабінет 👤</h1>
                </header>
                <div class="glass bg-white/80 p-5 rounded-3xl flex items-center gap-4 shadow-sm mt-2">
                    <div class="w-16 h-16 bg-rose-200 rounded-full flex items-center justify-center text-2xl font-bold text-rose-600 shadow-sm" id="profile-avatar"></div>
                    <div>
                        <div class="font-bold text-slate-800 text-lg" id="profile-name"></div>
                        <div class="text-xs text-slate-500 bg-slate-200/50 px-2 py-1 rounded-md mt-1 inline-block" id="profile-id"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="admin-screen" class="hidden-step fade-in">
            <div id="admin-tab-home" class="admin-tab-content pt-24">
                <header class="fixed top-0 left-0 right-0 z-40 max-w-md mx-auto bg-white border-b border-slate-200 px-4 py-4 shadow-sm">
                    <h1 class="text-xl font-bold text-slate-900 truncate">Панель майстра: <span id="admin-header-name"></span></h1>
                    <p class="text-slate-500 text-sm">Статистика та аналітика</p>
                </header>
                <div class="flex gap-2 mb-6 bg-slate-200/50 p-1 rounded-xl">
                    <button onclick="renderAdminStats('day')" id="stat-btn-day" class="flex-1 py-2 bg-white shadow-sm rounded-lg text-sm font-bold text-slate-800 transition-all">Сьогодні</button>
                    <button onclick="renderAdminStats('week')" id="stat-btn-week" class="flex-1 py-2 text-slate-500 rounded-lg text-sm font-bold transition-all">Тиждень</button>
                    <button onclick="renderAdminStats('month')" id="stat-btn-month" class="flex-1 py-2 text-slate-500 rounded-lg text-sm font-bold transition-all">Місяць</button>
                </div>
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <div class="glass bg-white/90 p-4 rounded-3xl shadow-sm text-center border border-slate-100 flex flex-col justify-center">
                        <div class="text-2xl font-extrabold text-slate-800" id="stat-count">0</div>
                        <div class="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-wider">Записів</div>
                    </div>
                    <div class="glass bg-white/90 p-4 rounded-3xl shadow-sm text-center border border-slate-100 flex flex-col justify-center">
                        <div class="text-xl font-extrabold text-teal-600" id="stat-revenue">0 ₴</div>
                        <div class="text-[10px] font-bold text-slate-500 mt-1.5 uppercase tracking-wider">Дохід</div>
                    </div>
                    <div class="glass bg-white/90 p-4 rounded-3xl shadow-sm text-center border border-slate-100 flex flex-col justify-center">
                        <div class="text-2xl font-extrabold text-rose-500" id="stat-cancelled">0</div>
                        <div class="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-wider">Скасовано</div>
                    </div>
                </div>
            </div>

            <div id="admin-tab-bookings" class="admin-tab-content hidden-step pt-36">
                <header class="fixed top-0 left-0 right-0 z-40 max-w-md mx-auto bg-white shadow-sm">
                    <div class="px-4 py-4 border-b border-slate-200">
                        <h1 class="text-xl font-bold text-slate-900 truncate">Панель майстра: <span id="admin-header-name-2"></span></h1>
                    </div>
                    <div class="flex">
                        <button onclick="switchBookingTab('active', 'admin')" id="admin-subtab-active" class="flex-1 py-3 text-sm font-bold border-b-2 border-teal-500 text-teal-600">Активні</button>
                        <button onclick="switchBookingTab('cancelled', 'admin')" id="admin-subtab-cancelled" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400">Скасовані</button>
                    </div>
                </header>
                <div id="admin-bookings-list" class="space-y-4"></div>
            </div>
        </div>

    </div>

    <nav id="client-bottom-nav" class="hidden-step fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around p-2 pb-6 z-50 max-w-md mx-auto shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('client', 'home')" id="client-nav-home" class="flex flex-col items-center justify-center p-2 text-rose-500 transition-colors w-20">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l9 8h-3v10h-5v-6h-2v6H6V11H3l9-8z"/></svg><span class="text-[10px] font-bold uppercase tracking-wider">Головна</span>
        </button>
        <button onclick="switchTab('client', 'bookings')" id="client-nav-bookings" class="flex flex-col items-center justify-center p-2 text-slate-400 transition-colors w-20">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"/></svg><span class="text-[10px] font-bold uppercase tracking-wider">Візити</span>
        </button>
        <button onclick="switchTab('client', 'profile')" id="client-nav-profile" class="flex flex-col items-center justify-center p-2 text-slate-400 transition-colors w-20">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span class="text-[10px] font-bold uppercase tracking-wider">Профіль</span>
        </button>
    </nav>

    <nav id="admin-bottom-nav" class="hidden-step fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around p-2 pb-6 z-50 max-w-md mx-auto shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('admin', 'home')" id="admin-nav-home" class="flex flex-col items-center justify-center p-2 text-teal-600 transition-colors w-20">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg><span class="text-[10px] font-bold uppercase tracking-wider">Головна</span>
        </button>
        <button onclick="switchTab('admin', 'bookings')" id="admin-nav-bookings" class="flex flex-col items-center justify-center p-2 text-slate-400 transition-colors w-20">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><span class="text-[10px] font-bold uppercase tracking-wider">Записи</span>
        </button>
    </nav>

    <div id="cancel-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-6 z-50">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm space-y-4">
            <h3 class="font-bold text-lg" id="cancel-modal-title">Причина скасування</h3>
            <textarea id="cancel-reason" class="w-full p-4 bg-slate-100 rounded-2xl outline-none h-32" placeholder="Напишіть коментар..."></textarea>
            <div class="flex gap-2">
                <button onclick="closeCancelModal()" class="flex-1 py-3 rounded-xl bg-slate-200 font-semibold text-slate-700">Назад</button>
                <button id="confirm-cancel-btn" onclick="confirmCancel()" class="flex-1 py-3 rounded-xl bg-red-500 text-white font-semibold">Скасувати</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

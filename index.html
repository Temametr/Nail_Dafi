<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Запис на манікюр TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.3, 0.9, 0.3, 1.1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.96)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    },
                    boxShadow: {
                        'convex': '0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04), 0 30px 40px -10px rgba(15, 23, 42, 0.06)',
                        'convex-sm': '0 6px 10px -2px rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        // НОВА: Глибока тінь для навбара + внутрішній відблиск для об'єму
                        'floating': '0 25px 50px -12px rgba(15, 23, 42, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.8)',
                    }
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        
        .card-convex { background-color: #ffffff; border: 1px solid #ffffff; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04), 0 30px 40px -10px rgba(15, 23, 42, 0.06); border-radius: 2rem; }
        .card-convex-sm { background-color: #ffffff; border: 1px solid #ffffff; box-shadow: 0 6px 10px -2px rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.03); border-radius: 1.5rem; }

        /* ОНОВЛЕНО: Компактна шапка з тінню */
        .ios-header {
            background: linear-gradient(180deg, rgba(230, 240, 250, 0.98) 0%, rgba(240, 244, 249, 0.95) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.9);
            border-radius: 0 0 1.75rem 1.75rem; /* Зменшене скруглення */
            box-shadow: 0 10px 30px -10px rgba(30, 60, 100, 0.12); /* Чітка тінь */
        }

        /* ОНОВЛЕНО: Об'ємний навбар з тонкою обводкою */
        .floating-nav { 
            background-color: rgba(255, 255, 255, 0.92); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(200, 210, 220, 0.5); /* Тонка контрастна обводка */
            border-radius: 2rem; 
        }
        
        .hidden-step { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .selected-item { background: linear-gradient(135deg, #fb7185, #e11d48) !important; color: white !important; border-color: transparent !important; box-shadow: 0 10px 20px -3px rgba(225, 29, 72, 0.4) !important; transform: translateY(-2px) scale(1.01); transition: all 0.3s ease; }
        .tab-content { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-rose-50 min-h-screen font-sans antialiased text-slate-800 pb-36 viewport-fit-cover">

    <div id="app" class="max-w-md mx-auto relative">
        
        <div id="loader" class="flex flex-col items-center justify-center h-[75vh]">
            <div class="relative flex justify-center items-center">
                <div class="absolute w-20 h-20 border-4 border-rose-200 rounded-full opacity-60"></div>
                <div class="w-20 h-20 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
            </div>
            <p class="mt-6 text-rose-300 font-medium tracking-wide">Магія налаштовується...</p>
        </div>

        <div id="client-screen" class="hidden-step animate-fade-in-up">
            
            <header class="fixed top-0 left-0 right-0 z-50 max-w-md mx-auto ios-header px-5 py-4 flex justify-between items-center">
                <div class="absolute top-[-1rem] right-[-1rem] w-32 h-32 bg-blue-500/10 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="relative z-10 flex-1 min-w-0 pr-4">
                    <h1 class="text-xl font-extrabold text-slate-900 tracking-tight truncate" id="client-header-title"></h1>
                </div>
                
                <div class="relative z-10 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-sm text-slate-600 shrink-0 border border-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <div class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></div>
                </div>
            </header>

            <div id="tab-home" class="tab-content pt-[100px] px-4">
                <div id="step-booking" class="step-content space-y-4 animate-pop-in">
                    <h3 class="font-bold text-xs px-2 text-rose-300 uppercase tracking-[0.15em]">Оберіть послугу</h3>
                    <div id="services-list" class="space-y-4 px-1"></div>
                </div>
                <div id="step-master" class="step-content hidden-step space-y-4 animate-pop-in">
                    <h3 class="font-bold text-xs px-2 text-rose-300 uppercase tracking-[0.15em]">Оберіть майстра</h3>
                    <div id="masters-list" class="space-y-4 px-1"></div>
                </div>
                <div id="step-datetime" class="step-content hidden-step space-y-4 animate-pop-in">
                    <h3 class="font-bold text-xs px-2 text-rose-300 uppercase tracking-[0.15em]">Оберіть дату</h3>
                    <div id="date-scroll" class="flex overflow-x-auto gap-3 pb-4 px-1 hide-scrollbar -mx-4 px-5"></div>
                    <h3 class="font-bold text-xs px-2 mt-2 text-rose-300 uppercase tracking-[0.15em]">Вільний час</h3>
                    <div id="time-loader" class="hidden text-center text-sm font-medium text-rose-300 py-6">Аналізуємо графік...</div>
                    <div id="time-slots" class="grid grid-cols-3 gap-3 px-1"></div>
                </div>
            </div>

            <div id="tab-bookings" class="tab-content hidden-step pt-[100px] px-4">
                <div class="flex pb-4 gap-2 px-1">
                    <button onclick="switchBookingTab('active', 'client')" id="client-subtab-active" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider bg-slate-950 text-white rounded-xl shadow-lg transition-all duration-300">Підтверджені</button>
                    <button onclick="switchBookingTab('cancelled', 'client')" id="client-subtab-cancelled" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider bg-white text-slate-500 rounded-xl transition-all duration-300 border border-rose-100">Скасовані</button>
                </div>
                <div id="my-bookings-list" class="space-y-5 px-1"></div>
            </div>

            <div id="tab-profile" class="tab-content hidden-step pt-[100px] px-4">
                <div class="card-convex p-6 flex items-center gap-5 mx-1">
                    <div class="relative">
                        <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-3xl font-bold text-rose-500 shadow-inner border border-rose-100" id="profile-avatar"></div>
                        <div class="absolute bottom-1 right-1 w-4 h-4 bg-green-400 border-2 border-white rounded-full"></div>
                    </div>
                    <div>
                        <div class="font-extrabold text-slate-950 text-xl tracking-tight" id="profile-name"></div>
                        <div class="text-[11px] font-bold text-slate-500 bg-rose-50 px-3 py-1.5 rounded-lg mt-2 inline-block border border-rose-100">ID: <span id="profile-id"></span></div>
                    </div>
                </div>
                <div class="card-convex p-6 mt-5 space-y-5 mx-1">
                    <div class="flex justify-between items-center text-sm font-bold text-slate-700">
                        <span class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-rose-50 flex items-center justify-center text-rose-500">🔔</span> Сповіщення</span>
                        <span class="text-teal-700 bg-teal-50 px-3 py-1 rounded-full text-xs">Увімкнено</span>
                    </div>
                    <hr class="border-rose-50">
                    <div class="flex justify-between items-center text-sm font-bold text-slate-700">
                        <span class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-rose-50 flex items-center justify-center text-slate-500">🇺🇦</span> Мова додатка</span>
                        <span class="font-semibold text-slate-900">Українська</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="admin-screen" class="hidden-step animate-fade-in-up">
            
            <header class="fixed top-0 left-0 right-0 z-50 max-w-md mx-auto ios-header px-5 py-4 flex justify-between items-center">
                <div class="absolute top-[-1rem] right-[-1rem] w-32 h-32 bg-teal-500/10 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="relative z-10 flex-1 min-w-0 pr-4">
                    <h1 class="text-xl font-extrabold text-slate-900 tracking-tight truncate" id="admin-header-title"></h1>
                </div>
                
                <div class="relative z-10 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-sm text-slate-600 shrink-0 border border-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
            </header>

            <div id="admin-tab-home" class="admin-tab-content pt-[100px] px-4">
                <div class="flex gap-2 mb-6 bg-white/40 border border-white/60 p-1.5 rounded-2xl mx-1 backdrop-blur-sm">
                    <button onclick="renderAdminStats('day')" id="stat-btn-day" class="flex-1 py-2.5 bg-white shadow-md rounded-xl text-xs font-bold uppercase tracking-wider text-slate-950 transition-all duration-300">Сьогодні</button>
                    <button onclick="renderAdminStats('week')" id="stat-btn-week" class="flex-1 py-2.5 text-slate-400 rounded-xl text-xs font-bold uppercase tracking-wider transition-all duration-300">Тиждень</button>
                    <button onclick="renderAdminStats('month')" id="stat-btn-month" class="flex-1 py-2.5 text-slate-400 rounded-xl text-xs font-bold uppercase tracking-wider transition-all duration-300">Місяць</button>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6 mx-1">
                    <div class="card-convex p-6 flex flex-col justify-center animate-pop-in">
                        <div class="text-4xl font-black text-slate-950 tracking-tighter" id="stat-count">0</div>
                        <div class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">Записів</div>
                    </div>
                    <div class="grid grid-rows-2 gap-4">
                        <div class="card-convex p-4 rounded-3xl flex flex-col justify-center animate-pop-in [animation-delay:100ms]">
                            <div class="text-xl font-black text-teal-600 tracking-tight" id="stat-revenue">0 ₴</div>
                            <div class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Дохід</div>
                        </div>
                        <div class="card-convex p-4 rounded-3xl flex flex-col justify-center animate-pop-in [animation-delay:200ms]">
                            <div class="text-xl font-black text-red-500 tracking-tight" id="stat-cancelled">0</div>
                            <div class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Скасовано</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="admin-tab-bookings" class="admin-tab-content hidden-step pt-[100px] px-4">
                <div class="flex px-1 pb-4 gap-2">
                    <button onclick="switchBookingTab('active', 'admin')" id="admin-subtab-active" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider bg-slate-950 text-white rounded-xl shadow-lg shadow-slate-950/20 transition-all duration-300">Активні</button>
                    <button onclick="switchBookingTab('cancelled', 'admin')" id="admin-subtab-cancelled" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider bg-white text-slate-500 rounded-xl transition-all duration-300 border border-rose-100">Скасовані</button>
                </div>
                <div id="admin-bookings-list" class="space-y-5 px-1"></div>
            </div>
        </div>

    </div>

    <div id="client-bottom-nav" class="hidden-step fixed bottom-6 left-5 right-5 z-50 max-w-md mx-auto">
        <nav class="floating-nav shadow-floating flex justify-around p-2">
            <button onclick="switchTab('client', 'home')" id="client-nav-home" class="flex flex-col items-center justify-center p-3 text-blue-500 transition-all duration-300 w-20 rounded-xl hover:bg-blue-50">
                <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l9 8h-3v10h-5v-6h-2v6H6V11H3l9-8z"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Запис</span>
            </button>
            <button onclick="switchTab('client', 'bookings')" id="client-nav-bookings" class="flex flex-col items-center justify-center p-3 text-slate-400 transition-all duration-300 w-20 rounded-xl hover:bg-rose-50/50">
                <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Візити</span>
            </button>
            <button onclick="switchTab('client', 'profile')" id="client-nav-profile" class="flex flex-col items-center justify-center p-3 text-slate-400 transition-all duration-300 w-20 rounded-xl hover:bg-rose-50/50">
                <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Профіль</span>
            </button>
        </nav>
    </div>

    <div id="admin-bottom-nav" class="hidden-step fixed bottom-6 left-5 right-5 z-50 max-w-md mx-auto">
        <nav class="floating-nav shadow-floating flex justify-around p-2">
            <button onclick="switchTab('admin', 'home')" id="admin-nav-home" class="flex flex-col items-center justify-center p-3 text-teal-600 transition-all duration-300 w-24 rounded-xl hover:bg-teal-50">
                <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Дашборд</span>
            </button>
            <button onclick="switchTab('admin', 'bookings')" id="admin-nav-bookings" class="flex flex-col items-center justify-center p-3 text-slate-400 transition-all duration-300 w-24 rounded-xl hover:bg-rose-50/50">
                <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Записи</span>
            </button>
        </nav>
    </div>

    <div id="cancel-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-5 z-[60] transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm space-y-6 shadow-floating animate-pop-in border border-white">
            <div class="text-center space-y-2">
                <div class="w-16 h-14 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-3 text-2xl border border-red-100">⚠️</div>
                <h3 class="font-black text-xl text-slate-900 tracking-tight" id="cancel-modal-title">Скасувати?</h3>
                <p class="text-xs text-slate-400 font-medium">Повідомте іншу сторону про причину</p>
            </div>
            
            <textarea id="cancel-reason" class="w-full p-4 bg-rose-50/30 border border-rose-100 rounded-[1.25rem] outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-300 transition-all h-32 text-sm placeholder:text-slate-400 resize-none font-medium" placeholder="Напишіть коментар..."></textarea>
            
            <div class="flex gap-3 pt-2">
                <button onclick="closeCancelModal()" class="flex-1 py-4 rounded-[1.25rem] bg-slate-50 text-slate-600 font-bold active:scale-95 transition-all text-sm">Назад</button>
                <button id="confirm-cancel-btn" onclick="confirmCancel()" class="flex-1 py-4 rounded-[1.25rem] bg-red-500 text-white font-bold shadow-lg shadow-red-200 active:scale-95 transition-all text-sm">Скасувати</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

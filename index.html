<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Запис на манікюр TMA</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.3, 0.9, 0.3, 1.1) forwards',
                    },

                    keyframes: {
                        fadeInUp: {
                            '0%': {
                                opacity: '0',
                                transform: 'translateY(15px)'
                            },

                            '100%': {
                                opacity: '1',
                                transform: 'translateY(0)'
                            }
                        },

                        popIn: {
                            '0%': {
                                opacity: '0',
                                transform: 'scale(0.96)'
                            },

                            '100%': {
                                opacity: '1',
                                transform: 'scale(1)'
                            }
                        }
                    },

                    boxShadow: {
                        'convex': '0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04), 0 30px 40px -10px rgba(15, 23, 42, 0.06)',
                        'floating': '0 25px 50px -12px rgba(15, 23, 42, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.8)',
                    }
                }
            }
        }
    </script>

    <style>

        body {
            -webkit-tap-highlight-color: transparent;
        }

        .card-convex {
            background-color: #ffffff;
            border: 1px solid #ffffff;

            box-shadow:
                0 10px 15px -3px rgba(0, 0, 0, 0.08),
                0 4px 6px -2px rgba(0, 0, 0, 0.04);

            border-radius: 2rem;
        }

        .card-convex-sm {
            background-color: #ffffff;
            border: 1px solid #ffffff;

            box-shadow:
                0 6px 10px -2px rgba(0, 0, 0, 0.08),
                0 2px 4px -1px rgba(0, 0, 0, 0.03);

            border-radius: 1.5rem;
        }

        .ios-header {
            background:
                linear-gradient(
                    180deg,
                    rgba(230, 240, 250, 0.98) 0%,
                    rgba(240, 244, 249, 0.95) 100%
                );

            backdrop-filter: blur(25px);

            border-bottom:
                1px solid rgba(255,255,255,0.9);

            border-radius:
                0 0 1.75rem 1.75rem;

            box-shadow:
                0 10px 30px -10px rgba(30, 60, 100, 0.12);
        }

        .floating-nav {
            background-color:
                rgba(255, 255, 255, 0.92);

            backdrop-filter: blur(15px);

            border:
                1px solid rgba(200, 210, 220, 0.5);

            border-radius: 2rem;
        }

        .hidden-step {
            display: none !important;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .selected-item {
            background:
                linear-gradient(
                    135deg,
                    #3b82f6,
                    #2563eb
                ) !important;

            color: white !important;

            border-color:
                transparent !important;

            box-shadow:
                0 10px 20px -3px rgba(37, 99, 235, 0.4) !important;

            transform: scale(1.05);

            z-index: 10;
        }

        .tab-content {
            transition: opacity 0.3s ease;
        }

    </style>
</head>

<body class="bg-rose-50 min-h-screen font-sans antialiased text-slate-800 pb-36 viewport-fit-cover">

<div id="app" class="max-w-md mx-auto relative">

    <div
        id="loader"
        class="
            flex
            flex-col
            items-center
            justify-center
            h-[75vh]
        "
    >

        <div class="relative flex justify-center items-center">

            <div class="
                absolute
                w-20
                h-20
                border-4
                border-rose-200
                rounded-full
                opacity-60
            "></div>

            <div class="
                w-20
                h-20
                border-4
                border-blue-500
                rounded-full
                border-t-transparent
                animate-spin
            "></div>

        </div>

        <p class="
            mt-6
            text-rose-300
            font-medium
            tracking-wide
            text-sm
        ">
            Магія налаштовується...
        </p>

    </div>

    <div id="client-screen" class="hidden-step">

        <header class="
            fixed
            top-0
            left-0
            right-0
            z-50
            max-w-md
            mx-auto
            ios-header
            px-5
            py-5
            flex
            justify-between
            items-center
        ">

            <div class="
                absolute
                top-[-1rem]
                right-[-1rem]
                w-32
                h-32
                bg-blue-500/10
                rounded-full
                blur-2xl
                pointer-events-none
            "></div>

            <div class="
                relative
                z-10
                flex
                items-center
                gap-3
                flex-1
                min-w-0
                pr-4
            ">

                <img
                    src="media/fe3010af-51aa-45b3-a20e-6cd526642666.png"
                    alt="Logo"
                    class="
                        w-14
                        h-14
                        object-contain
                        drop-shadow-md
                        shrink-0
                    "
                >

                <h1
                    id="client-header-title"
                    class="
                        text-[19px]
                        font-extrabold
                        text-slate-900
                        tracking-tight
                        truncate
                        leading-tight
                        mt-0.5
                    "
                ></h1>

            </div>

        </header>

        <div
            id="tab-home"
            class="
                tab-content
                pt-[110px]
                px-4
                animate-fade-in-up
            "
        ></div>

        <div
            id="tab-booking-flow"
            class="
                tab-content
                hidden-step
                pt-[110px]
                px-4
                animate-fade-in-up
            "
        ></div>

        <div
            id="tab-bookings"
            class="
                tab-content
                hidden-step
                pt-[110px]
                px-4
                animate-fade-in-up
            "
        ></div>

        <div
            id="tab-messages"
            class="
                tab-content
                hidden-step
                pt-[110px]
                px-4
                animate-fade-in-up
                pb-10
            "
        ></div>

        <div
            id="tab-profile"
            class="
                tab-content
                hidden-step
                pt-[110px]
                px-4
                animate-fade-in-up
                pb-10
            "
        ></div>

    </div>

    <div
        id="client-bottom-nav"
        class="
            hidden-step
            fixed
            bottom-6
            left-5
            right-5
            z-50
            max-w-md
            mx-auto
        "
    >

        <nav class="
            floating-nav
            shadow-floating
            flex
            justify-around
            p-2
            items-center
        ">

            <button
                onclick="window.appAPI.switchTab('client', 'home')"
                id="client-nav-home"
                class="
                    flex
                    flex-col
                    items-center
                    justify-center
                    p-2
                    text-blue-500
                    w-16
                    rounded-xl
                    transition-all
                "
            >

                <svg
                    class="w-6 h-6 mb-0.5"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                >
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>

                <span class="
                    text-[9px]
                    font-bold
                    uppercase
                ">
                    Головна
                </span>

            </button>

            <button
                onclick="window.appAPI.switchTab('client', 'bookings')"
                id="client-nav-bookings"
                class="
                    flex
                    flex-col
                    items-center
                    justify-center
                    p-2
                    text-slate-400
                    w-16
                    rounded-xl
                    transition-all
                "
            >

                <svg
                    class="w-6 h-6 mb-0.5"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                >
                    <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"/>
                </svg>

                <span class="
                    text-[9px]
                    font-bold
                    uppercase
                ">
                    Візити
                </span>

            </button>

            <button
                onclick="window.appAPI.switchTab('client', 'messages')"
                id="client-nav-messages"
                class="
                    relative
                    flex
                    flex-col
                    items-center
                    justify-center
                    p-2
                    text-slate-400
                    w-16
                    rounded-xl
                    transition-all
                "
            >

                <span
                    id="client-nav-messages-badge"
                    class="
                        hidden
                        absolute
                        -top-1
                        right-2
                        min-w-[18px]
                        h-[18px]
                        px-1
                        rounded-full
                        bg-red-500
                        text-white
                        text-[10px]
                        font-black
                        flex
                        items-center
                        justify-center
                        border-2
                        border-white
                    "
                ></span>

                <svg
                    class="w-6 h-6 mb-0.5"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                >
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                </svg>

                <span class="
                    text-[9px]
                    font-bold
                    uppercase
                ">
                    Чати
                </span>

            </button>

            <button
                onclick="window.appAPI.switchTab('client', 'profile')"
                id="client-nav-profile"
                class="
                    flex
                    flex-col
                    items-center
                    justify-center
                    p-2
                    text-slate-400
                    w-16
                    rounded-xl
                    transition-all
                "
            >

                <svg
                    class="w-6 h-6 mb-0.5"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                >
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>

                <span class="
                    text-[9px]
                    font-bold
                    uppercase
                ">
                    Профіль
                </span>

            </button>

        </nav>

    </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>

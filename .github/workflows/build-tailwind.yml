name: Build Tailwind CSS

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'js/**'
      - 'src/input.css'
      - 'tailwind.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-tailwind.yml'

  workflow_dispatch:

concurrency:
  group: build-tailwind-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-tailwind:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Ensure dist folder exists
        run: mkdir -p dist

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Commit compiled CSS
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add dist/output.css

          if git diff --cached --quiet; then
            echo "No CSS changes to commit"
          else
            git commit -m "Build Tailwind CSS [skip ci]"
            git pull --rebase origin main
            git push
          fi